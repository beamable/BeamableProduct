name: Notify Docs of Unity SDK Release

on:
  push:
    tags:
      - 'unity-sdk-[0-9]*'
      - '!unity-sdk-*-PREVIEW*'
      - '!unity-sdk-*-RC*'

jobs:
  dispatch:
    name: Dispatch unity-sdk-released to beamable/docs
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to beamable/docs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DOCS_DISPATCH_PAT }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const sdkVersion = tag.replace('unity-sdk-', '');
            await github.rest.repos.createDispatchEvent({
              owner: 'beamable',
              repo: 'docs',
              event_type: 'unity-sdk-released',
              client_payload: { tag, sdk_version: sdkVersion }
            });
            core.info(`Dispatched unity-sdk-released (${tag}) to beamable/docs`);
