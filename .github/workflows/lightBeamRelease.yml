name: LightBeam Release

on:
  workflow_call:
    inputs: 
      customTag:
        description: 'Custom tag for manual dispatch'
        required: false
        type: string
      optionalAlias: 
        description: 'an extra alias to publish the lightbeam for. Useful to grouping patches under their minor. '
        required: false
        type: string

    secrets:
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
      UNITY_SERIAL:
        required: true
      AWS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_LIGHTBEAM_S3_BUCKET:
        required: true
  workflow_dispatch:
    inputs:
      customTag:
        description: 'Custom tag for manual dispatch'
        required: false
      optionalAlias: 
        description: 'an extra alias to publish the lightbeam for. Useful to grouping patches under their minor. '
        required: false
        type: string
env:
  DOCKER_REGISTRY: ghcr.io

jobs:

  build:
    name: Lightbeams
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
    env:
      TARGET_PLATFORM: WebGL
      UNITY_VERSION: 2022.3.7f1
      PROJECT_PATH: client
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
      AWS_KEY_ID: ${{ secrets.AWS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_LIGHTBEAM_S3_BUCKET: ${{ secrets.AWS_LIGHTBEAM_S3_BUCKET }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Read Inputs
        id: inputs
        run: |
          #!/bin/bash

          # Merge customTag
          CUSTOM_TAG="${{ inputs.customTag || github.event.inputs.customTag || '' }}"
          OPTIONAL_ALIAS="${{ inputs.optionalAlias || github.event.inputs.optionalAlias || '' }}"

          echo "Merged customTag: $CUSTOM_TAG"
          echo "Merged optionalAlias: $OPTIONAL_ALIAS"

          # Set outputs
          echo "custom_tag=$CUSTOM_TAG" >> $GITHUB_OUTPUT
          echo "optional_alias=$OPTIONAL_ALIAS" >> $GITHUB_OUTPUT

      - name: Display Inputs
        run: |
          echo tag=[${{ steps.inputs.outputs.custom_tag }}]
          echo alias=[${{ steps.inputs.outputs.optional_alias }}]

      - uses: actions/checkout@v4
        name: Checkout Branch
        with:
          fetch-depth: 0
          lfs: true
          ref: ${{ steps.inputs.outputs.custom_tag }}
        
      - name: Get cloudfront function from the current branch
        run: |
          git show main:build/lightbeam_cloudfront_alias_template.js > build/lightbeam_cloudfront_alias_template.js
      - name: confirm cloudfront function template exists
        run: |
          cat build/lightbeam_cloudfront_alias_template.js
          

      - name: Prepare Config-Defaults
        run: |
          chmod +x ./build/create_config_defaults.sh
          ./build/create_config_defaults.sh
        shell: bash
      
      - name: Cache Unity Folders
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.PROJECT_PATH }}/Library
            ${{ env.PROJECT_PATH }}/Temp
            ${{ env.PROJECT_PATH }}/obj
          key: Library-${{ env.PROJECT_PATH }}-${{ env.UNITY_VERSION }}-${{ env.TARGET_PLATFORM }}
          restore-keys: |
            Library-${{ env.PROJECT_PATH }}-${{ env.UNITY_VERSION }}-${{ env.TARGET_PLATFORM }}
      - name: Clean the build directory
        continue-on-error: true
        run: |
          rm -rf /github/workspace/dist
        shell: bash

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          

      - uses: game-ci/unity-builder@v4
        timeout-minutes: 60
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          customImage: ${{ env.DOCKER_REGISTRY }}/beamable/editor:ubuntu-${{ env.UNITY_VERSION }}-webgl-3.1.0
          customParameters: -LIGHTBEAM_BUILD_PATH dist
          targetPlatform: ${{ env.TARGET_PLATFORM }}
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: ${{ env.PROJECT_PATH }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          allowDirtyBuild: true
          buildMethod: LightBeamBuilds.BuildAll

      - name: Check Asset
        continue-on-error: true
        run: |
          ls -a ${{ env.PROJECT_PATH }}/dist
        shell: bash

      - name: upload named version
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-west-2
        run: aws s3 cp --recursive ./${{ env.PROJECT_PATH }}/dist s3://${{secrets.AWS_LIGHTBEAM_S3_BUCKET}}/version/${{ steps.inputs.outputs.custom_tag }} --acl public-read
      
      - name: List valid semver versions from S3
        id: versions
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-west-2
        run: |
          set -e

          BUCKET=${{ secrets.AWS_LIGHTBEAM_S3_BUCKET }}

          echo "Listing version prefixes from bucket: $BUCKET"

          aws s3api list-objects-v2 \
            --bucket "$BUCKET" \
            --prefix version/ \
            --delimiter '/' \
            --query 'CommonPrefixes[].Prefix' \
            --output text > prefixes.txt

          echo "Raw prefixes found:"
          cat prefixes.txt

          echo "Filtering valid semver versions..."

          > versions.txt

          while read prefix; do
            name=$(basename "$prefix")

            if [[ $name =~ ^version/unity-sdk-([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              version=${BASH_REMATCH[1]}
              echo "$version" >> versions.txt
            fi
          done < prefixes.txt

          echo "Valid versions detected:"
          cat versions.txt

          echo "Sorting versions (descending)..."

          sort -Vr versions.txt > versions_sorted.txt

          echo "Sorted versions:"
          cat versions_sorted.txt

          echo "versions<<EOF" >> $GITHUB_OUTPUT
          cat versions_sorted.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate CloudFront function
        id: cf_function
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-west-2
        run: |
          set -e

          echo "Generating CloudFront function from template..."

          TEMPLATE_FILE=./build/lightbeam_cloudfront_alias_template.js
          OUTPUT_FILE=function.js

          if [ ! -f "$TEMPLATE_FILE" ]; then
            echo "ERROR: Template not found at $TEMPLATE_FILE"
            exit 1
          fi

          # Read versions from previous step
          VERSIONS="${{ steps.versions.outputs.versions }}"

          echo "Versions to inject:"
          echo "$VERSIONS"

          # Create JS array literal
          VERSION_ARRAY=""
          first=true
          while read v; do
            if [ "$first" = true ]; then
              VERSION_ARRAY="\"$v\""
              first=false
            else
              VERSION_ARRAY="$VERSION_ARRAY, \"$v\""
            fi
          done <<< "$VERSIONS"

          # Inject into template
          sed "s|/\\* versions will be injected here by CI \\*/|$VERSION_ARRAY|" "$TEMPLATE_FILE" > "$OUTPUT_FILE"

          echo "Generated CloudFront function:"
          cat "$OUTPUT_FILE"

      - name: Deploy CloudFront function
        run: |
          set -e

          FUNCTION_NAME=lightbeam-version-resolver

          echo "Deploying CloudFront function: $FUNCTION_NAME"

          if aws cloudfront describe-function --name "$FUNCTION_NAME" >/dev/null 2>&1; then
            echo "Function exists — updating..."

            ETAG=$(aws cloudfront describe-function \
              --name "$FUNCTION_NAME" \
              --query 'ETag' \
              --output text)

            echo "Current ETag: $ETAG"

            aws cloudfront update-function \
              --name "$FUNCTION_NAME" \
              --if-match "$ETAG" \
              --function-config Comment="Unity SDK version resolver",Runtime=cloudfront-js-1.0 \
              --function-code fileb://function.js

          else
            echo "Function does not exist — creating..."

            aws cloudfront create-function \
              --name "$FUNCTION_NAME" \
              --function-config Comment="Unity SDK version resolver",Runtime=cloudfront-js-1.0 \
              --function-code fileb://function.js
          fi

          echo "Publishing function..."

          ETAG=$(aws cloudfront describe-function \
            --name "$FUNCTION_NAME" \
            --query 'ETag' \
            --output text)

          aws cloudfront publish-function \
            --name "$FUNCTION_NAME" \
            --if-match "$ETAG"

          echo "CloudFront function deployed successfully."

      - name: Prepare Cloudfront Invalidation 
        run: |
          CLOUD_DISTRO=E3WCWLOU0CURK
          CALLER_REFERENCE=$(date -u +"%Y%m%d%H%M%S")
          echo '{"DistributionId":"'${CLOUD_DISTRO}'","InvalidationBatch":{"CallerReference":"'${CALLER_REFERENCE}'","Paths":{"Quantity":1,"Items":["/version/*"]}}}' >> cloudfront-invalidation.json
      - name: Preview Cloudfront Invalidation 
        run: |
          cat cloudfront-invalidation.json
      - name: Do Cloudfront Invalidation
        run: AWS_ACCESS_KEY_ID=${{secrets.AWS_KEY_ID}} AWS_SECRET_ACCESS_KEY=${{secrets.AWS_SECRET_ACCESS_KEY}} AWS_REGION=us-west-2 aws cloudfront create-invalidation --cli-input-json file://cloudfront-invalidation.json
