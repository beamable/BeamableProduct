name: Web SDK Release

on:
  workflow_dispatch:
    inputs:
      commit:
        type: string
        description: Commit hash to deploy
        default: main
      major:
        type: number
        description: Major version number, X.0.0
        required: true
        default: 0
      minor:
        type: number
        description: Minor version number, 0.X.0
        required: true
        default: 0
      patch:
        type: number
        description: Patch version number, 0.0.X
        required: true
        default: 0
      rcNumber:
        type: number
        description: Rc version number, if required, 0.0.0-rc.X
        required: false
        default: 0
      releaseType:
        type: choice
        description: What type of release is this?
        required: true
        options:
          - nightly
          - rc
          - exp
          - production
      dryRun:
        type: boolean
        description: When true, no publish will happen
        required: true
        default: false

run-name: >-
  Release Web SDK ${{ inputs.releaseType }}
  ${{ inputs.major }}.${{ inputs.minor }}.${{ inputs.patch }}
  ${{ inputs.releaseType == 'rc' && format('-rc.{0}', inputs.rcNumber) || '' }}
  by @${{ github.actor }}

jobs:
  web-sdk-release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit }}

      - name: Use Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm@10.8.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Compute version
        id: version
        run: |
          VERSION="${{ inputs.major }}.${{ inputs.minor }}.${{ inputs.patch }}"
          if [ "${{ inputs.releaseType }}" == "rc" ]; then
            VERSION="${VERSION}-rc.${{ inputs.rcNumber }}"
          elif [ "${{ inputs.releaseType }}" != "production" ]; then
            VERSION="${VERSION}-${{ inputs.releaseType }}"
          fi
          NPM_TAG="${{ inputs.releaseType }}"
          if [ "${{ inputs.releaseType }}" == "production" ]; then
            NPM_TAG="latest"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "NPM_TAG=$NPM_TAG" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION (tag: $NPM_TAG)"

      - name: Set package version
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      # prepublishOnly runs build automatically
      - name: Publish to npm
        if: ${{ inputs.dryRun == false }}
        run: npm publish --no-git-checks --provenance --access public --tag ${{ steps.version.outputs.NPM_TAG }}

      - name: Create Release
        id: create_release
        if: ${{ inputs.dryRun == false }} 
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: web-sdk-${{ steps.version.outputs.VERSION }}
          release_name: Web SDK ${{ steps.version.outputs.VERSION }}
          body: |
            Web SDK Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ inputs.releaseType != 'production' }}

      - name: Publish Changelog
        if: ${{ inputs.dryRun == false }}
        run: sh ./../build/bin/upload-changelogs.sh
        env:
          COPY_UNITY_SDK: 'false'
          COPY_CLI: 'false'
          COPY_WEB_SDK: 'true'
          VERSION: ${{ steps.version.outputs.VERSION }}
          GITHUB_USERNAME: ${{ secrets.GIT_CHANGELOGS_USERNAME }}
          GITHUB_PASSWORD: ${{ secrets.GIT_CHANGELOGS_PASSWORD }}
          BRANCH: >-
            ${{ fromJson('{
              "nightly": "daily",
              "rc": "staging",
              "exp": "staging",
              "production": "production"
            }')[github.event.inputs.releaseType] }}

      - name: Dry run build
        if: ${{ inputs.dryRun == true }}
        run: pnpm prepublishOnly
